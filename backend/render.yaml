services:
  - type: web
    name: college-platform-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: college-platform-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: college-platform-db
    databaseName: college_platform
    user: college_user
    plan: free
